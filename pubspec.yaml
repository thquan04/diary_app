name: apdatdoan
description: "A Flutter food delivery application - Ứng dụng đặt đồ ăn."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  http: ^1.1.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  smooth_page_indicator: ^1.0.1

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Fonts removed to avoid build errors when font files are missing.
  # To add custom fonts, create `assets/fonts/` and update this section.


